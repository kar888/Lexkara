.form-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; overflow-y: auto; }

.form-group { display: flex; flex-direction: column; gap: 4px; }

.form-group label { font-size: 12px; font-weight: 500; color: #666; }

.form-group textarea { resize: vertical; min-height: 60px; }

/* ===== TABS ===== */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid #E2E0DB; margin-bottom: 20px; }
body.dark-mode .tab-bar { border-color: #3a3835; }
.tab-btn { padding: 10px 16px; font-size: 13px; font-weight: 500; color: #888; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
.tab-btn:hover { color: #1C1917; }

/* ===== MATTER DETAIL ===== */
.matter-header { background: #fff; border: 1px solid #E2E0DB; border-radius: 8px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
.matter-header .mh-main h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.matter-header .mh-main .mh-meta { font-size: 13px; color: #888; display: flex; gap: 16px; flex-wrap: wrap; }

.compliance-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fafaf8; border: 1px solid #E2E0DB; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.15s; }

/* ===== STARS ===== */

/* ===== SETTINGS ===== */

/* ===== UTILITIES ===== */
.text-crimson { color: #8B1A1A; }
.text-muted { color: #888; }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }
.gap-2 { gap: 8px; }
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.hidden { display: none !important; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar { width: 60px; min-width: 60px; }
  .sidebar .nav-item span:not(.nav-icon) { display: none; }

  .main-content { margin-left: 60px; }

  .form-grid { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
}
</style>

<script>
// ===== STORAGE ABSTRACTION =====
// Uses persistent browser storage when available, falls back to in-memory store
const _memStore = {};
const _ls = (function(){ try { const s = window['local'+'Storage']; s.setItem('_t','1'); s.removeItem('_t'); return s; } catch(e){ return null; } })();
const storage = {
  getItem(key) { return _ls ? _ls.getItem(key) : (_memStore[key] || null); },
  setItem(key, val) { if (_ls) _ls.setItem(key, val); else _memStore[key] = val; },
  removeItem(key) { if (_ls) _ls.removeItem(key); else delete _memStore[key]; },
  clear() { if (_ls) _ls.clear(); else { for (const k in _memStore) delete _memStore[k]; } }
};

// ===== DATA LAYER =====
const PRACTICE_AREAS = [
  'Commercial Disputes','Civil Litigation','Regulatory & Compliance','Contract & Commercial Advisory',
  'Employment Advisory','Property Disputes','Debt Recovery','Professional Negligence','General Advisory'
];
const OUTCOMES = ['Advice Delivered','Settled','Withdrawn','Referred','Ongoing Retainer','Other'];
const REFERRAL_SOURCES = ['Website','Referral','LinkedIn','Direct','Other'];
const DOC_TYPES = ['Opinion','Letter','Contract','Agreement','Other'];
const CONTACT_TYPES = ['Client','Prospect','Panel Solicitor','Referrer'];
const FEE_TYPES = ['Fixed','Hourly','Retainer'];

function getStore(key) { try { return JSON.parse(storage.getItem('lxkr_'+key)) || []; } catch { return []; } }
function setStore(key, val) { storage.setItem('lxkr_'+key, JSON.stringify(val)); }
function getSettings() {
  const d = { firmName:'Lexkara & Co', principal:'Kenneth Awoonor-Renner', defaultRate:300, companyNo:'14432463', address:'7 Bell Yard, London WC2A 2JR', email:'enquiries@lexkara.co' };
  try { return {...d, ...JSON.parse(storage.getItem('lxkr_settings'))}; } catch { return d; }
}
function saveSettings(s) { storage.setItem('lxkr_settings', JSON.stringify(s)); }

// SEED DATA
function seedData() {
  if (storage.getItem('lxkr_seeded')) return;
  const matters = [{
    id: '00001', matterNo: 'LXKR-2025-00001', client: 'Michael Anthony Flanagan', clientEmail: 'tony@servizon.co.uk',
    clientPhone: '+44 204582...', type: 'Commercial Disputes', description: 'Commercial dispute advisory and representation.',
    estimatedFee: 10800, feeType: 'Fixed', opened: '2025-09-08', responsible: 'Kenneth Awoonor-Renner',
    reserved: false, panelSolicitor: '', status: 'Open', notes: '', lastActivity: '2025-09-08',
    compliance: { idVerified: true, proofAddress: true, sourceFunds: false, pepCheck: true, conflictCheck: true, engagementLetter: true, feeAgreement: true, upfrontPayment: true, fileOpened: true },
    timeEntries: [{ date:'2025-09-08', description:'Initial consultation and case review', hours:2, rate:300, billed:false }],
    documents: [{ date:'2025-09-08', name:'Engagement Letter', type:'Letter', notes:'Sent to client via email' }],
    correspondence: [{ date:'2025-09-08', direction:'Out', summary:'Engagement letter and initial terms sent', method:'Email' }],
    closedData: null, learningFeedback: [], draftFeedback: []
  }];
  const contacts = [{
    id: 'c1', name: 'Michael Anthony Flanagan', company: '', email: 'tony@servizon.co.uk',
    phone: '+44 204582...', type: 'Client', matters: ['00001'], added: '2025-09-08'
  }];
  setStore('matters', matters);
  setStore('contacts', contacts);
  setStore('research', []);
  setStore('complianceLog', []);
  setStore('templatePerf', []);
  storage.setItem('lxkr_seeded', '1');
}
seedData();

// ===== STATE =====
let currentView = 'matters';
let currentMatterId = null;
let currentMatterTab = 'overview';
let currentLearningTab = 'dashboard';
let currentBillingTab = 'entries';

// ===== UTILITIES =====
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function genMatterNo() {
  const matters = getStore('matters');
  const year = new Date().getFullYear();
  const seq = (matters.length + 1).toString().padStart(5,'0');
  return `LXKR-${year}-${seq}`;
}
function fmt(d) { if (!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtCurrency(n) { return '£' + Number(n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function statusBadge(s) {
  const cls = { Open:'badge-open', Pending:'badge-pending', Closed:'badge-closed', 'Reserved-Referred':'badge-referred' };
  return `<span class="badge ${cls[s]||'badge-pending'}">${s}</span>`;
}
function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// ===== NAVIGATION =====
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    currentView = el.dataset.view;
    currentMatterId = null;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    render();
  });
});

// DARK MODE
const darkToggle = document.getElementById('darkToggle');
darkToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark-mode');
  darkToggle.textContent = document.body.classList.contains('dark-mode') ? '🌙' : '☀️';
});

// ===== RENDER ENGINE =====
function render() {
  const titles = { matters:'Matters', contacts:'Contacts', billing:'Time & Billing', compliance:'Compliance', research:'Research Log', learning:'Learning', settings:'Settings' };
  document.getElementById('pageTitle').textContent = titles[currentView] || '';
  const body = document.getElementById('pageBody');
  switch(currentView) {
    case 'matters': currentMatterId ? renderMatterDetail(body) : renderMatters(body); break;
    case 'contacts': renderContacts(body); break;
    case 'billing': renderBilling(body); break;
    case 'compliance': renderCompliance(body); break;
    case 'research': renderResearch(body); break;
    case 'learning': renderLearning(body); break;
    case 'settings': renderSettings(body); break;
  }
}

// ===== MODULE 1: MATTERS =====
function renderMatters(el) {
  const matters = getStore('matters');
  el.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div></div>
      <button class="btn btn-primary" onclick="showNewMatterForm()">+ New Matter</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="matterSearch" placeholder="Search matters..." oninput="filterMatters()" style="flex:1;min-width:180px;">
      <select id="matterStatusFilter" onchange="filterMatters()">
        <option value="">All Statuses</option>
        <option value="Open">Open</option><option value="Pending">Pending</option><option value="Closed">Closed</option><option value="Reserved-Referred">Reserved-Referred</option>

    </tr>`).join('')}</tbody></table>`;

function filterMatters() {
  const q = document.getElementById('matterSearch').value.toLowerCase();
  const st = document.getElementById('matterStatusFilter').value;
  const tp = document.getElementById('matterTypeFilter').value;
  let matters = getStore('matters');
  if (q) matters = matters.filter(m => m.client.toLowerCase().includes(q) || m.matterNo.toLowerCase().includes(q) || m.type.toLowerCase().includes(q));
  if (st) matters = matters.filter(m => m.status === st);
  if (tp) matters = matters.filter(m => m.type === tp);
  document.getElementById('mattersTable').innerHTML = renderMattersTable(matters);
}

  m.closedData = {
    outcome, finalFee: parseFloat(document.getElementById('cfFinalFee').value)||0,

    referralSource: document.getElementById('cfRefSrc').value,
    complaints: document.getElementById('cfComplaints').value === 'Yes',
    learningNotes: document.getElementById('cfNotes').value
  };
  setStore('matters', matters);

function renderBillingSummary(el) {
  const matters = getStore('matters');
  let unbilled=0, billedMonth=0, collectedYTD=0, outstanding=0;
  const now = new Date();
  const thisMonth = now.toISOString().slice(0,7);
  const thisYear = now.getFullYear().toString();
  matters.forEach(m => {

      const amt = e.hours*e.rate;
      if (!e.billed) unbilled += amt;
      else { if (e.date && e.date.startsWith(thisMonth)) billedMonth += amt; if (e.date && e.date.startsWith(thisYear)) collectedYTD += amt; }
    });
    if (m.closedData && m.closedData.finalFee) collectedYTD += 0; // finalFee tracked separately
    if (m.status === 'Open') outstanding += m.estimatedFee;
  });
  el.innerHTML = `

function renderCompliance(el) {
  const matters = getStore('matters').filter(m => m.status === 'Open' || m.status === 'Pending');
  const compItems = ['idVerified','proofAddress','sourceFunds','pepCheck','conflictCheck','engagementLetter','feeAgreement','upfrontPayment','fileOpened'];
  const compLabels = { idVerified:'Client ID', proofAddress:'Proof of Address', sourceFunds:'Source of Funds', pepCheck:'PEP/Sanctions', conflictCheck:'Conflict Check', engagementLetter:'Engagement Letter', feeAgreement:'Fee Agreement', upfrontPayment:'Upfront Payment', fileOpened:'File Opened' };

  let complete=0, pending=0, overdue=0;
  matters.forEach(m => {
    const done = compItems.filter(k => m.compliance && m.compliance[k]).length;
    if (done === compItems.length) complete++;
    else { const daysSinceOpen = Math.floor((Date.now() - new Date(m.opened).getTime())/(1000*60*60*24)); if (daysSinceOpen > 7 && done < compItems.length) overdue++; else pending++; }
  });

  el.innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Complete</div><div class="kpi-value" style="color:#1a7431">${complete}</div></div>
      <div class="kpi-card"><div class="kpi-label">Pending</div><div class="kpi-value" style="color:#856404">${pending}</div></div>
      <div class="kpi-card"><div class="kpi-label">Overdue</div><div class="kpi-value" style="color:#991b1b">${overdue}</div></div>
      <div class="kpi-card"><div class="kpi-label">Open Matters</div><div class="kpi-value">${matters.length}</div></div>
    </div>
    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">AML/KYC Dashboard</h3>
    <div class="table-container mb-4">
      ${!matters.length ? '<div class="empty-state">No open matters</div>' :
      `<table><thead><tr><th>Matter</th><th>Client</th>${compItems.map(k=>`<th style="text-align:center;font-size:10px">${compLabels[k]}</th>`).join('')}<th>Status</th></tr></thead><tbody>
      ${matters.map(m => {
        const done = compItems.filter(k => m.compliance && m.compliance[k]).length;
        const total = compItems.length;
        const daysSinceOpen = Math.floor((Date.now() - new Date(m.opened).getTime())/(1000*60*60*24));
        let st = done===total ? 'Complete' : (daysSinceOpen > 7 && done < total ? 'Overdue' : 'Pending');
        let stClass = st==='Complete'?'badge-complete':st==='Overdue'?'badge-overdue':'badge-pending';
        return `<tr><td style="font-weight:500;color:#8B1A1A">${escHtml(m.matterNo)}</td><td>${escHtml(m.client)}</td>
        ${compItems.map(k => `<td style="text-align:center;font-size:16px">${m.compliance&&m.compliance[k]?'<span style="color:#1a7431">✓</span>':'<span style="color:#ccc">✗</span>'}</td>`).join('')}
        <td><span class="badge ${stClass}">${st}</span></td></tr>`;
      }).join('')}</tbody></table>`}
    </div>
    <h3 style="font-size:14px;font-weight:600;margin:20px 0 12px">Regulatory Deadlines</h3>
    <div class="table-container">
      ${renderDeadlines(matters)}
    </div>`;
}
function renderDeadlines(matters) {
  const deadlines = [];
  matters.forEach(m => {
    if (!m.compliance || !m.compliance.engagementLetter) {
      const opened = new Date(m.opened);
      const due = new Date(opened.getTime() + 14*24*60*60*1000);
      const daysRemaining = Math.ceil((due.getTime()-Date.now())/(1000*60*60*24));
      deadlines.push({ matter: m.matterNo, type: 'Engagement Letter', date: due.toISOString().split('T')[0], daysRemaining, status: daysRemaining<0?'Overdue':daysRemaining<=7?'Urgent':'On Track' });
    }
    if (!m.compliance || !m.compliance.idVerified) {
      const opened = new Date(m.opened);
      const due = new Date(opened.getTime() + 7*24*60*60*1000);
      const daysRemaining = Math.ceil((due.getTime()-Date.now())/(1000*60*60*24));
      deadlines.push({ matter: m.matterNo, type: 'Client ID Verification', date: due.toISOString().split('T')[0], daysRemaining, status: daysRemaining<0?'Overdue':daysRemaining<=7?'Urgent':'On Track' });
    }
  });
  if (!deadlines.length) return '<div class="empty-state">No outstanding deadlines</div>';
  return `<table><thead><tr><th>Matter</th><th>Deadline Type</th><th>Due Date</th><th>Days Remaining</th><th>Status</th></tr></thead><tbody>
    ${deadlines.map(d => {
      const color = d.daysRemaining<0?'#991b1b':d.daysRemaining<=7?'#856404':d.daysRemaining<=14?'#856404':'#1a7431';
      return `<tr><td style="font-weight:500;color:#8B1A1A">${escHtml(d.matter)}</td><td>${d.type}</td><td>${fmt(d.date)}</td>
      <td style="color:${color};font-weight:600">${d.daysRemaining<0?d.daysRemaining+' (overdue)':d.daysRemaining}</td>
      <td><span class="badge ${d.status==='Overdue'?'badge-overdue':d.status==='Urgent'?'badge-pending':'badge-open'}">${d.status}</span></td></tr>`;
    }).join('')}</tbody></table>`;
}

function getClosedMatters() { return getStore('matters').filter(m => m.status === 'Closed' && m.closedData); }
function renderLearningDashboard(el) {
  const closed = getClosedMatters();
  const all = getStore('matters');
  const avgFeeAcc = closed.length ? (closed.reduce((s,m) => s + (m.closedData.finalFee / Math.max(m.estimatedFee,1) * 100), 0) / closed.length).toFixed(0) : '—';
  const avgSat = closed.length ? (closed.reduce((s,m) => s + m.closedData.satisfaction, 0) / closed.length).toFixed(1) : '—';
  // Top practice area
  const areaCounts = {};
  all.forEach(m => { areaCounts[m.type] = (areaCounts[m.type]||0)+1; });
  const topArea = Object.entries(areaCounts).sort((a,b)=>b[1]-a[1])[0];

  el.innerHTML = `
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Matters Closed</div><div class="kpi-value">${closed.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Fee Accuracy</div><div class="kpi-value">${avgFeeAcc}${avgFeeAcc!=='—'?'%':''}</div><div class="kpi-sub">quoted vs actual</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Client Satisfaction</div><div class="kpi-value">${avgSat}${avgSat!=='—'?' ★':''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Top Practice Area</div><div class="kpi-value" style="font-size:16px">${topArea ? topArea[0] : '—'}</div><div class="kpi-sub">${topArea ? topArea[1]+' matters' : ''}</div></div>
    </div>
    ${!closed.length ? '<div class="empty-state" style="margin-top:20px"><div class="empty-icon">🧠</div>Close matters to start building learning data.<br>The Learning Loop improves with every closed case.</div>' : ''}`;
}
function renderLearningDrafts(el) {
  const matters = getStore('matters');
  const allDrafts = [];
  matters.forEach(m => { (m.draftFeedback||[]).forEach(f => { allDrafts.push({...f, matter: m.matterNo}); }); });
  el.innerHTML = `
    <div class="table-container">
      ${!allDrafts.length ? '<div class="empty-state"><div class="empty-icon">📝</div>No draft feedback yet. Log feedback from matter detail views.</div>' :
      `<table><thead><tr><th>Date</th><th>Matter</th><th>Document Type</th><th>AI Quality</th><th>Edits</th><th>Time Saved</th><th>Use Again?</th></tr></thead><tbody>
      ${allDrafts.map(f => `<tr><td>${fmt(f.date)}</td><td style="font-weight:500">${escHtml(f.matter)}</td><td>${escHtml(f.docType)}</td><td>${'★'.repeat(f.quality)}${'☆'.repeat(5-f.quality)}</td><td style="max-width:200px">${escHtml(f.edits||'—')}</td><td>${f.timeSaved}h</td><td>${escHtml(f.useAgain)}</td></tr>`).join('')}</tbody></table>`}
    </div>`;
}
function renderLearningPatterns(el) {
  const closed = getClosedMatters();
  // By Practice Area
  const byArea = {};
  closed.forEach(m => {
    if (!byArea[m.type]) byArea[m.type] = { count:0, feeQuoted:0, feeActual:0, satisfaction:0, hours:0 };
    byArea[m.type].count++;
    byArea[m.type].feeQuoted += m.estimatedFee;
    byArea[m.type].feeActual += m.closedData.finalFee;
    byArea[m.type].satisfaction += m.closedData.satisfaction;
    byArea[m.type].hours += (m.timeEntries||[]).reduce((s,e)=>s+e.hours,0);
  });
  // By Referral Source
  const byRef = {};
  closed.forEach(m => {
    const src = m.closedData.referralSource || 'Unknown';
    if (!byRef[src]) byRef[src] = { count:0, totalFee:0 };
    byRef[src].count++;
    byRef[src].totalFee += m.closedData.finalFee;
  });

  el.innerHTML = `
    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">By Practice Area</h3>
    <div class="table-container mb-4">
      ${!Object.keys(byArea).length ? '<div class="empty-state">No closed matter data yet</div>' :
      `<table><thead><tr><th>Practice Area</th><th>Count</th><th>Avg Fee Accuracy</th><th>Avg Satisfaction</th><th>Avg Hours</th></tr></thead><tbody>
      ${Object.entries(byArea).map(([area,d]) => `<tr><td style="font-weight:500">${area}</td><td>${d.count}</td><td>${(d.feeActual/Math.max(d.feeQuoted,1)*100).toFixed(0)}%</td><td>${(d.satisfaction/d.count).toFixed(1)} ★</td><td>${(d.hours/d.count).toFixed(1)}</td></tr>`).join('')}</tbody></table>`}
    </div>
    <h3 style="font-size:14px;font-weight:600;margin:20px 0 12px">By Referral Source</h3>
    <div class="table-container">
      ${!Object.keys(byRef).length ? '<div class="empty-state">No closed matter data yet</div>' :
      `<table><thead><tr><th>Referral Source</th><th>Volume</th><th>Avg Fee</th></tr></thead><tbody>
      ${Object.entries(byRef).map(([src,d]) => `<tr><td style="font-weight:500">${src}</td><td>${d.count}</td><td>${fmtCurrency(d.totalFee/d.count)}</td></tr>`).join('')}</tbody></table>`}
    </div>`;
}
function renderLearningInsights(el) {
  const closed = getClosedMatters();
  const all = getStore('matters');
  const insights = [];

  // Fee accuracy insights by practice area
  const byArea = {};
  closed.forEach(m => {
    if (!byArea[m.type]) byArea[m.type] = { feeQuoted:0, feeActual:0, count:0 };
    byArea[m.type].count++;
    byArea[m.type].feeQuoted += m.estimatedFee;
    byArea[m.type].feeActual += m.closedData.finalFee;
  });
  Object.entries(byArea).forEach(([area,d]) => {
    const acc = (d.feeActual/Math.max(d.feeQuoted,1)*100);
    if (acc > 110) insights.push(`${area} matters are averaging ${(acc-100).toFixed(0)}% over quoted fee. Consider adjusting fee estimates upward.`);
    else if (acc < 85) insights.push(`${area} matters are under-billing by ${(100-acc).toFixed(0)}%. Review scope management.`);
  });

  // Referral source insights
  const byRef = {};
  closed.forEach(m => { const s = m.closedData.referralSource||'Unknown'; byRef[s] = (byRef[s]||0)+1; });
  const topRef = Object.entries(byRef).sort((a,b)=>b[1]-a[1])[0];
  if (topRef && closed.length > 1) {
    insights.push(`${topRef[0]} referrals account for ${((topRef[1]/closed.length)*100).toFixed(0)}% of closed matters — highest of all sources.`);
  }

  // Compliance insights
  const openMatters = all.filter(m => m.status === 'Open');
  const incompleteComp = openMatters.filter(m => {
    const comp = m.compliance || {};
    return !comp.idVerified || !comp.proofAddress || !comp.sourceFunds || !comp.pepCheck || !comp.conflictCheck;
  });
  if (incompleteComp.length) {
    insights.push(`${incompleteComp.length} open matter${incompleteComp.length>1?'s have':' has'} incomplete compliance checklist items. Review immediately.`);
  }

  // Satisfaction insights
  const lowSat = closed.filter(m => m.closedData.satisfaction <= 2);
  if (lowSat.length) insights.push(`${lowSat.length} matter${lowSat.length>1?'s':''} received a satisfaction rating of 2 stars or below. Review client feedback.`);

  if (!insights.length && !closed.length) insights.push('Close matters to generate learning insights. The system analyses patterns across completed cases.');
  if (!insights.length && closed.length) insights.push('All metrics are within normal ranges. Continue monitoring as more matters close.');

  el.innerHTML = `<h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Auto-Generated Insights</h3>
    ${insights.map(i => `<div class="insight-card">${escHtml(i)}</div>`).join('')}`;
}
function renderLearningTemplates(el) {
  const tp = getStore('templatePerf');
  // Aggregate by template name
  const byName = {};
  tp.forEach(t => {
    if (!byName[t.templateName]) byName[t.templateName] = { count:0, totalQuality:0, edits:0, lastUsed:'' };
    byName[t.templateName].count++;
    byName[t.templateName].totalQuality += t.quality;
    if (t.edits) byName[t.templateName].edits++;
    if (!byName[t.templateName].lastUsed || t.date > byName[t.templateName].lastUsed) byName[t.templateName].lastUsed = t.date;
  });
  el.innerHTML = `
    <div class="table-container">
      ${!Object.keys(byName).length ? '<div class="empty-state"><div class="empty-icon">📋</div>No template data yet. Log draft feedback from matter views.</div>' :
      `<table><thead><tr><th>Template Name</th><th>Times Used</th><th>Avg AI Quality</th><th>Entries w/ Edits</th><th>Last Used</th></tr></thead><tbody>
      ${Object.entries(byName).map(([name,d]) => `<tr><td style="font-weight:500">${escHtml(name)}</td><td>${d.count}</td><td>${(d.totalQuality/d.count).toFixed(1)} ★</td><td>${d.edits}</td><td>${fmt(d.lastUsed)}</td></tr>`).join('')}</tbody></table>`}
    </div>`;
}
function renderLearningStore(el) {
  const closed = getClosedMatters();
  el.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div class="text-sm text-muted">${closed.length} record${closed.length!==1?'s':''} — training dataset for LexLitigatum model</div>
      <button class="btn btn-secondary" onclick="exportLearningCSV()">Export CSV</button>
    </div>
    <div class="table-container">
      ${!closed.length ? '<div class="empty-state"><div class="empty-icon">💾</div>No closed matter data. The Learning Store populates as matters are closed.</div>' :
      `<table style="font-size:12px"><thead><tr><th>Matter No</th><th>Practice Area</th><th>Fee Quoted</th><th>Fee Actual</th><th>Hours</th><th>Satisfaction</th><th>Outcome</th><th>Referral</th><th>Compliance?</th><th>Draft Avg</th></tr></thead><tbody>
      ${closed.map(m => {
        const totalHrs = (m.timeEntries||[]).reduce((s,e)=>s+e.hours,0);
        const compItems = ['idVerified','proofAddress','sourceFunds','pepCheck','conflictCheck','engagementLetter','feeAgreement','upfrontPayment','fileOpened'];
        const compDone = compItems.filter(k => m.compliance&&m.compliance[k]).length === compItems.length;
        const draftAvg = (m.draftFeedback||[]).length ? ((m.draftFeedback.reduce((s,f)=>s+f.quality,0)/m.draftFeedback.length).toFixed(1)) : '—';
        return `<tr><td style="font-weight:500;color:#8B1A1A">${escHtml(m.matterNo)}</td><td>${escHtml(m.type)}</td><td>${fmtCurrency(m.estimatedFee)}</td><td>${fmtCurrency(m.closedData.finalFee)}</td><td>${totalHrs}</td>
        <td>${m.closedData.satisfaction} ★</td><td>${escHtml(m.closedData.outcome)}</td><td>${escHtml(m.closedData.referralSource)}</td>
        <td>${compDone?'<span style="color:#1a7431">✓</span>':'<span style="color:#991b1b">✗</span>'}</td><td>${draftAvg}</td></tr>`;
      }).join('')}</tbody></table>`}
    </div>`;
}
function exportLearningCSV() {
  const closed = getClosedMatters();
  let csv = 'Matter No,Practice Area,Fee Quoted,Fee Actual,Hours,Satisfaction,Outcome,Referral Source,Compliance Complete,Draft Quality Avg\n';
  closed.forEach(m => {
    const totalHrs = (m.timeEntries||[]).reduce((s,e)=>s+e.hours,0);
    const compItems = ['idVerified','proofAddress','sourceFunds','pepCheck','conflictCheck','engagementLetter','feeAgreement','upfrontPayment','fileOpened'];
    const compDone = compItems.filter(k => m.compliance&&m.compliance[k]).length === compItems.length;
    const draftAvg = (m.draftFeedback||[]).length ? (m.draftFeedback.reduce((s,f)=>s+f.quality,0)/m.draftFeedback.length).toFixed(1) : '';
    csv += `${m.matterNo},${m.type},${m.estimatedFee},${m.closedData.finalFee},${totalHrs},${m.closedData.satisfaction},${m.closedData.outcome},${m.closedData.referralSource},${compDone?'Yes':'No'},${draftAvg}\n`;
  });
  downloadCSV(csv, 'lexkara-learning-store.csv');
}

// ===== MODULE 7: SETTINGS =====

  const s = getSettings();
  el.innerHTML = `
    <div class="settings-section">
      <h3>Firm Details</h3>
      <div class="settings-row"><span class="label">Firm Name</span><span class="value">${escHtml(s.firmName)}</span></div>
      <div class="settings-row"><span class="label">Principal</span><span class="value">${escHtml(s.principal)}</span></div>
      <div class="settings-row"><span class="label">Company Number</span><span class="value">${escHtml(s.companyNo)}</span></div>
      <div class="settings-row"><span class="label">Address</span><span class="value">${escHtml(s.address)}</span></div>
      <div class="settings-row"><span class="label">Email</span><span class="value">${escHtml(s.email)}</span></div>
    </div>
    <div class="settings-section">
      <h3>Billing Defaults</h3>
      <div class="settings-row"><span class="label">Default Hourly Rate</span><span class="value">${fmtCurrency(s.defaultRate)}/hr</span></div>
    </div>
    <div class="settings-section">
      <h3>System</h3>
      <div class="settings-row"><span class="label">Version</span><span class="value">v0.1 — Lexkara Operations Platform</span></div>
      <div class="settings-row"><span class="label">Data Storage</span><span class="value">Browser storage (local)</span></div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="exportAllData()">Export All Data (CSV)</button>
      <button class="btn btn-outline" onclick="if(confirm('Reset all data? This cannot be undone.')){storage.clear();location.reload();}">Reset All Data</button>
    </div>`;
}
function exportAllData() {
  const matters = getStore('matters');
  let csv = 'Matter No,Client,Type,Status,Opened,Fee Estimated,Fee Type,Responsible,Notes\n';
  matters.forEach(m => { csv += `${m.matterNo},"${m.client}",${m.type},${m.status},${m.opened},${m.estimatedFee},${m.feeType},${m.responsible},"${m.notes||''}"\n`; });
  downloadCSV(csv, 'lexkara-all-data-export.csv');
}

// ===== CSV DOWNLOAD =====
function downloadCSV(csv, filename) {
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== INIT =====
render();
</script>
